<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" width="800" height="800">
  <defs>
    <linearGradient id="gloss-black" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A2A27"/>
      <stop offset="100%" stop-color="#0A0A09"/>
    </linearGradient>
    <linearGradient id="gloss-emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D7A52"/>
      <stop offset="100%" stop-color="#1A5C3A"/>
    </linearGradient>
    <linearGradient id="gloss-mist" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8C4BC"/>
      <stop offset="100%" stop-color="#9B9B94"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EDE9E3" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="22" flood-color="#0A0A09" flood-opacity="0.13"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#F5F4F1"/>
  <rect width="800" height="800" fill="url(#vignette)"/>

  <!-- Mark — centered at 400,400 -->
  <g transform="translate(400,400)" filter="url(#shadow)">

    <!-- Top-left: Matte Black — 140×140, gap 12 -->
    <rect x="-152" y="-152" width="140" height="140" rx="5" fill="url(#gloss-black)"/>
    <rect x="-152" y="-152" width="140" height="140" rx="5" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.2"/>
    <!-- White pixel accent -->
    <rect x="-48" y="-48" width="28" height="28" rx="3" fill="rgba(255,255,255,0.14)"/>
    <rect x="-41" y="-41" width="14" height="14" rx="1.5" fill="rgba(255,255,255,0.50)"/>

    <!-- Top-right: Emerald -->
    <rect x="12" y="-152" width="140" height="140" rx="5" fill="url(#gloss-emerald)"/>
    <rect x="12" y="-152" width="140" height="140" rx="5" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.2"/>
    <!-- Cross-hair mark -->
    <line x1="82" y1="-144" x2="82" y2="-122" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
    <line x1="71" y1="-133" x2="93" y2="-133" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
    <!-- Pixel accent top-right quad -->
    <rect x="18" y="-146" width="22" height="22" rx="2.5" fill="rgba(255,255,255,0.10)"/>
    <rect x="23" y="-141" width="12" height="12" rx="1.5" fill="rgba(255,255,255,0.28)"/>

    <!-- Bottom-left: Mist -->
    <rect x="-152" y="12" width="140" height="140" rx="5" fill="url(#gloss-mist)" opacity="0.42"/>
    <rect x="-152" y="12" width="140" height="140" rx="5" fill="none" stroke="rgba(10,10,9,0.08)" stroke-width="1.2"/>
    <!-- Dot grid -->
    <rect x="-136" y="28" width="7" height="7" rx="1" fill="rgba(10,10,9,0.14)"/>
    <rect x="-118" y="28" width="7" height="7" rx="1" fill="rgba(10,10,9,0.09)"/>
    <rect x="-100" y="28" width="7" height="7" rx="1" fill="rgba(10,10,9,0.06)"/>
    <rect x="-136" y="46" width="7" height="7" rx="1" fill="rgba(10,10,9,0.09)"/>
    <rect x="-118" y="46" width="7" height="7" rx="1" fill="rgba(10,10,9,0.14)"/>
    <rect x="-100" y="46" width="7" height="7" rx="1" fill="rgba(10,10,9,0.06)"/>
    <rect x="-136" y="64" width="7" height="7" rx="1" fill="rgba(10,10,9,0.06)"/>
    <rect x="-118" y="64" width="7" height="7" rx="1" fill="rgba(10,10,9,0.09)"/>
    <rect x="-100" y="64" width="7" height="7" rx="1" fill="rgba(10,10,9,0.14)"/>

    <!-- Bottom-right: Deep Black -->
    <rect x="12" y="12" width="140" height="140" rx="5" fill="#0A0A09"/>
    <rect x="12" y="12" width="140" height="140" rx="5" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.2"/>
    <!-- Emerald signature pixel -->
    <rect x="98" y="98" width="38" height="38" rx="4" fill="#1A5C3A" opacity="0.92"/>
    <rect x="106" y="106" width="22" height="22" rx="2.5" fill="#2D7A52"/>
    <rect x="112" y="112" width="10" height="10" rx="1.5" fill="rgba(255,255,255,0.2)"/>

    <!-- Gap — horizontal bar (negative space) -->
    <rect x="-152" y="-6" width="304" height="12" fill="#F5F4F1"/>
    <!-- Gap — vertical bar (negative space) -->
    <rect x="-6" y="-152" width="12" height="304" fill="#F5F4F1"/>

    <!-- Center intersection jewel -->
    <circle cx="0" cy="0" r="7" fill="#1A5C3A"/>
    <circle cx="0" cy="0" r="3.5" fill="#2D7A52"/>

  </g>
</svg>
