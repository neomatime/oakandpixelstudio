name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Parse-check all JS (catches syntax / strict-mode errors)
        run: node scripts/check-syntax.mjs
      - name: Validate public pages (SEO/meta)
        run: node scripts/validate-site.mjs
      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test@1.49.1
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Headless smoke test (pages load without console errors)
        run: npx playwright test
